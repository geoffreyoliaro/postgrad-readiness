# Railway config for the API service.
# In the Railway dashboard, set this service's Root Directory to: api

[build]
builder = "RAILPACK"
buildCommand = "npm ci && npm run build && cp src/schema.sql dist/"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
